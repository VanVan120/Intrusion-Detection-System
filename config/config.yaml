pso:
  n_particles: 15
  n_iterations: 10
  c1: 0.5
  c2: 0.3
  w: 0.9

abc:
  colony_size: 20
  n_iterations: 10
  limit: 3

hybrid:
  n_particles: 20
  n_iterations: 10
  w: 0.729
  c1: 1.49445
  c2: 1.49445

joint:
  n_particles: 30
  n_iterations: 20
  alpha: 0.002
