data:
  raw_path: "data/raw"
  processed_path: "data/processed/processed_cicids2017.csv"
  test_size: 0.2
  random_state: 42
  sample_fraction: 0.1

model:
  decision_tree:
    criterion: "entropy"
    random_state: 42
    max_depth: null

ga:
